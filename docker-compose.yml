version: '3.8'

services:
  # Backend service - Go trading engine API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development with hot reload
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/trading_engine?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./backend:/app
      - /app/server  # Prevent overwriting compiled binary
    depends_on:
      - db
      - redis
    command: ["go", "run", "./cmd/server"]
    networks:
      - trading-network

  # Frontend service - React + Vite development server
  frontend:
    build:
      context: ./clients/desktop
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./clients/desktop:/app
      - /app/node_modules  # Don't override node_modules from container
    networks:
      - trading-network
    command: ["bun", "run", "dev", "--host"]

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=trading_engine
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - trading-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - trading-network

# Named volumes for data persistence
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

# Custom network for service communication
networks:
  trading-network:
    driver: bridge
